host: localhost:8080
info:
  contact: {}
  description: Portfolio tracking API
  title: My Portfolio API
  version: "1.0"
paths:
  /accounts:
    get:
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 100)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.paginatedAccounts'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List accounts with pagination
      tags:
      - accounts
    post:
      consumes:
      - application/json
      parameters:
      - description: Account payload
        in: body
        name: account
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.createAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_eriksalino_my-portfolio_api_internal_models.Account'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new account
      tags:
      - accounts
